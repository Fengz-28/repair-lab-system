services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-repairlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-repairlab}
    volumes:
      - repair_lab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-repairlab} -d $${POSTGRES_DB:-repairlab}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - repair_lab_internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_ENV: production
      APP_URL: ${APP_URL:?APP_URL is required}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:?PUBLIC_SITE_URL is required}
      ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS:?ADMIN_ALLOWED_ORIGINS is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-repairlab}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-repairlab}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-repair_lab_session}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_LOGIN_WINDOW_SECONDS: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:-300}
      RATE_LIMIT_LOGIN_MAX_ATTEMPTS: ${RATE_LIMIT_LOGIN_MAX_ATTEMPTS:-5}
      RATE_LIMIT_PUBLIC_WINDOW_SECONDS: ${RATE_LIMIT_PUBLIC_WINDOW_SECONDS:-60}
      RATE_LIMIT_PUBLIC_MAX_REQUESTS: ${RATE_LIMIT_PUBLIC_MAX_REQUESTS:-120}
      PRIVATE_STORAGE_ROOT: /app/storage/private
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-disabled}
      EMAIL_FROM: ${EMAIL_FROM:-FengzLab <no-reply@example.com>}
      INTEGRATION_WORKER_BATCH_SIZE: ${INTEGRATION_WORKER_BATCH_SIZE:-10}
      INTEGRATION_WORKER_MAX_RETRIES: ${INTEGRATION_WORKER_MAX_RETRIES:-5}
      INTEGRATION_WORKER_STALE_PROCESSING_MINUTES: ${INTEGRATION_WORKER_STALE_PROCESSING_MINUTES:-15}
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    volumes:
      - repair_lab_storage:/app/storage/private
      - repair_lab_backups:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - repair_lab_internal

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["ops"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-repairlab}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-repairlab}?schema=public
    networks:
      - repair_lab_internal

volumes:
  repair_lab_pgdata:
  repair_lab_storage:
  repair_lab_backups:

networks:
  repair_lab_internal:
    driver: bridge
