services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: repair_lab_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: repairlab
      POSTGRES_PASSWORD: repairlab_password
      POSTGRES_DB: repairlab

    ports:
      - "5432:5432"

    volumes:
      - repair_lab_pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repairlab -d repairlab"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repair_lab_app

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-docker-local}
      APP_URL: ${APP_URL:-http://localhost:3000}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:3000}
      ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://repairlab:repairlab_password@postgres:5432/repairlab?schema=public}
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-docker-local-secret}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-repair_lab_session}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-replace-with-local-admin-password}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_LOGIN_WINDOW_SECONDS: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:-300}
      RATE_LIMIT_LOGIN_MAX_ATTEMPTS: ${RATE_LIMIT_LOGIN_MAX_ATTEMPTS:-5}
      RATE_LIMIT_PUBLIC_WINDOW_SECONDS: ${RATE_LIMIT_PUBLIC_WINDOW_SECONDS:-60}
      RATE_LIMIT_PUBLIC_MAX_REQUESTS: ${RATE_LIMIT_PUBLIC_MAX_REQUESTS:-120}
      PRIVATE_STORAGE_ROOT: ${PRIVATE_STORAGE_ROOT:-/app/storage/private}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-Repair Lab <no-reply@example.com>}
      INTEGRATION_WORKER_BATCH_SIZE: ${INTEGRATION_WORKER_BATCH_SIZE:-10}
      INTEGRATION_WORKER_MAX_RETRIES: ${INTEGRATION_WORKER_MAX_RETRIES:-5}
      INTEGRATION_WORKER_STALE_PROCESSING_MINUTES: ${INTEGRATION_WORKER_STALE_PROCESSING_MINUTES:-15}

    ports:
      - "3000:3000"

    volumes:
      - repair_lab_storage:/app/storage/private
      - repair_lab_backups:/app/backups

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  repair_lab_pgdata:
  repair_lab_storage:
  repair_lab_backups:
